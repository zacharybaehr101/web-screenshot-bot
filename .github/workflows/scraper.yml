name: Daily Screenshot Scraper

on:
  schedule:
    - cron: '0 9 * * *' # Runs every day at 9:00 AM
  workflow_dispatch:      # Allows you to trigger it manually

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright pillow
          playwright install chromium

      - name: Run scraper
        run: python scraper.py
        env:
          # If you have other secrets like credentials, include them here
          AUTH_JSON: ${{ secrets.AUTH_JSON }}

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            ./*.jpg
            ./scrape_log.csv
